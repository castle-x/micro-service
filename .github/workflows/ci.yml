# GitHub Actions CI for micro-service
#
# 分级触发（依据 .axm/project/api-testing.md §5）：
#   feature push   → unit + lint + idl-compat            (< 3 min)
#   pull_request   → 上述 + integration + openapi        (< 10 min)
#   push to develop → 上述 + e2e                         (< 20 min)

name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  GO_VERSION: '1.22'

jobs:
  unit:
    name: Unit Tests + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # idl-compat 需要 git history
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Lint
        run: make lint
      - name: Unit tests
        run: make test-unit
      - name: IDL compat
        run: make idl-compat
        env:
          BASE_REF: origin/${{ github.base_ref || 'develop' }}

  contract:
    name: Contract Tests (OpenAPI)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm i -g @redocly/cli
      - run: make openapi-validate

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Integration tests (testcontainers)
        run: make test-integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'false'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Start dependencies
        run: |
          cp .env.example .env
          make infra-up
          make build
      - name: Run E2E
        run: make test-e2e
      - name: Collect logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: bin/log/
