# idp 服务配置（非敏感字段）
# 敏感字段通过环境变量注入：JWT_SECRET / GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
# 支付宝敏感字段：ALIPAY_APP_ID / ALIPAY_PRIVATE_KEY / ALIPAY_PUB_KEY

mongo:
  uri: "${MONGO_URI:mongodb://localhost:27017/platform}"
  db: "platform"

redis:
  addr: "${REDIS_ADDR:localhost:6379}"

jwt:
  secret: "${JWT_SECRET}"

google:
  client_id: "${GOOGLE_CLIENT_ID}"
  client_secret: "${GOOGLE_CLIENT_SECRET}"
  redirect_url: "${GOOGLE_REDIRECT_URL:http://localhost:38080/api/v1/auth/google/callback}"

# 支付宝登录
# ALIPAY_ENV=sandbox 时走沙箱配置（ALIPAY_SANDBOX_*），否则走正式配置（ALIPAY_*）
alipay:
  env: "${ALIPAY_ENV:sandbox}"

  # 正式环境
  app_id:        "${ALIPAY_APP_ID}"
  private_key:   "${ALIPAY_PRIVATE_KEY}"
  alipay_pub_key: "${ALIPAY_PUB_KEY}"
  redirect_url:  "${ALIPAY_REDIRECT_URL}"
  gateway_url:   "${ALIPAY_GATEWAY_URL:https://openapi.alipay.com/gateway.do}"
  auth_url:      "${ALIPAY_AUTH_URL:https://openauth.alipay.com/oauth2/publicAppAuthorize.htm}"

  # 沙箱环境
  sandbox_app_id:        "${ALIPAY_SANDBOX_APP_ID}"
  sandbox_private_key:   "${ALIPAY_SANDBOX_PRIVATE_KEY}"
  sandbox_alipay_pub_key: "${ALIPAY_SANDBOX_PUB_KEY}"
  sandbox_redirect_url:  "${ALIPAY_SANDBOX_REDIRECT_URL:http://localhost:38080/api/v1/auth/alipay/callback}"
  sandbox_gateway_url:   "${ALIPAY_SANDBOX_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}"
  sandbox_auth_url:      "${ALIPAY_SANDBOX_AUTH_URL:https://openauth-sandbox.dl.alipaydev.com/oauth2/publicAppAuthorize.htm}"

server:
  addr: ":38081"

iam:
  addr: "${IAM_ADDR:127.0.0.1:38082}"
